<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Co-Vacances</title><style>body{font-family:Arial,sans-serif;margin:0;background:#fffdf8;color:#1e293b}header{padding:40px;background:linear-gradient(135deg,#e8f8fc,#ffefe8)}.btn{background:#3BAFDA;color:#fff;border:none;padding:12px 20px;border-radius:12px;cursor:pointer;margin:5px}.btn2{background:#FF7A59}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;padding:30px}.card{background:#fff;border-radius:20px;box-shadow:0 4px 12px rgba(0,0,0,.1);overflow:hidden}.card img{width:100%;height:180px;object-fit:cover}.card .c{padding:15px}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6)}.content{background:#fff;max-width:700px;margin:5% auto;padding:20px;border-radius:20px}.close{float:right;cursor:pointer}</style></head><body><header><h1>☀️ Co‑Vacances</h1><h2>Ne partez plus seule en vacances !</h2><button class="btn" onclick="openModal('login')">Connexion</button><button class="btn btn2" onclick="openModal('search')">Trouver ma co‑vacancière</button><button class="btn btn2" onclick="openModal('propose')">Proposer un séjour</button></header><section class="cards"><div class="card" onclick="openModal('detail')"><img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=900&q=80"><div class="c"><h3>Vendée</h3><p>Julie, 39 ans</p><p>💕95% affinités</p></div></div></section><div id="login" class="modal"><div class="content"><span class='close' onclick='closeModal("login")'>✖</span><h2>Connexion</h2><input placeholder='Email'><br><br><input placeholder='Mot de passe' type='password'></div></div><div id="search" class="modal"><div class="content"><span class='close' onclick='closeModal("search")'>✖</span><h2>Trouver sa co‑vacancière</h2><select><option>Vendée</option><option>Côte d’Azur</option></select><br><br><input type='date'><input type='date'></div></div><div id="propose" class="modal"><div class="content"><span class='close' onclick='closeModal("propose")'>✖</span><h2>Proposer un séjour</h2><input placeholder='Lien du lieu' style='width:100%'><br><br><textarea style='width:100%;height:120px' placeholder='Description'></textarea></div></div><div id="detail" class="modal"><div class="content"><span class='close' onclick='closeModal("detail")'>✖</span><h2>Annonce</h2><p>Maison proche plage.</p><button class='btn' onclick='openModal("contact")'>Ça m’intéresse !</button><button class='btn btn2' onclick='openModal("question")'>Poser une question</button></div></div><div id="contact" class="modal"><div class="content"><span class='close' onclick='closeModal("contact")'>✖</span><h2>Prendre contact</h2><input value='Adresse masquée' disabled style='width:100%'><br><br><textarea style='width:100%;height:120px'>Bonjour, votre annonce m’intéresse.</textarea></div></div><div id="question" class="modal"><div class="content"><span class='close' onclick='closeModal("question")'>✖</span><h2>Poser une question</h2><textarea style='width:100%;height:120px'>Bonjour, j’ai une question.</textarea></div></div><script>function openModal(id){document.getElementById(id).style.display='block'} function closeModal(id){document.getElementById(id).style.display='none'}</script></body></html>
